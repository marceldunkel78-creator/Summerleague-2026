events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # --- HTTP: Let's Encrypt challenge + redirect to HTTPS ---
    # --- HTTP: LAN-Zugriff (Default) ---
    server {
        listen 80 default_server;
        server_name _;
	# NEU: Fewo
        location /fewo {
            proxy_pass http://ferienwohnung-app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /uploads/ {
            proxy_pass http://backend:3001;
        }
    }

    # --- HTTP: Ferienwohnung (direkt proxy; nach Zertifikat auf HTTPS-Redirect umstellen) ---
    server {
        listen 80;
        server_name fewo-tegernsee.duckdns.org www.fewo-tegernsee.duckdns.org;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            proxy_pass http://ferienwohnung-app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # --- HTTP: Domain → HTTPS Redirect + Let's Encrypt ---
    server {
        listen 80;
        server_name www.tennis-summerleague.de 3cmzgoc2hfvlps2u.myfritz.net;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- HTTPS ---
    server {
        listen 443 ssl http2;
        server_name www.tennis-summerleague.de 3cmzgoc2hfvlps2u.myfritz.net;

        ssl_certificate     /etc/letsencrypt/live/3cmzgoc2hfvlps2u.myfritz.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/3cmzgoc2hfvlps2u.myfritz.net/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
# NEU: Fewo
        location /fewo {
            proxy_pass http://ferienwohnung-app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /uploads/ {
            proxy_pass http://backend:3001;
        }
    }

    # --- HTTPS: Ferienwohnung ---
    # Zertifikat zuerst holen:
    # sudo docker exec summerleague-certbot certbot certonly --webroot -w /var/www/certbot -d fewo-tegernsee.duckdns.org
    # Danach diesen Block aktivieren und den HTTP-Block oben auf Redirect umstellen.
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name fewo-tegernsee.duckdns.org www.fewo-tegernsee.duckdns.org;
    #     ssl_certificate     /etc/letsencrypt/live/fewo-tegernsee.duckdns.org/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/fewo-tegernsee.duckdns.org/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     location / {
    #         proxy_pass http://ferienwohnung-app:3000;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto https;
    #     }
    # }
}
