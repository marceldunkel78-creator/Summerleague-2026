version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: summerleague-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    volumes:
      - ./backend/.env:/app/.env:ro
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
    ports:
      - "3001:3001"
    networks:
      - summerleague

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: summerleague-frontend
    restart: unless-stopped
    networks:
      - summerleague

  nginx:
    image: nginx:alpine
    container_name: summerleague-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    networks:
      - summerleague

  certbot:
    image: certbot/certbot
    container_name: summerleague-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  summerleague:
    driver: bridge
